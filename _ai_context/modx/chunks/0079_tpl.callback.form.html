<form class="ajax_form d-flex flex-wrap" action="{$_modx->resource.id | url}" method="post" id="callback-form">
    <input type="hidden" name="successMessage" value="{$successMessage}">
    <input type="hidden" name="validationErrorMessage" value="{$validationErrorMessage}">
    <div class="form-group col-12 mb-3">
        <label class="form-label" for="af_fullname">Ваше имя&nbsp;<span class="red">*</span></label>
        <input class="form-control" type="text" placeholder="Имя, фамилия" id="af_fullname" name="fullname" value="{$_modx->user.fullname}" readonly>
    </div>
    <div class="form-group col-12 mb-3">
        <label class="form-label" for="af_email">E-mail&nbsp;<span class="red">*</span></label>
        <input class="form-control" type="email" placeholder="E-mail" id="af_email" name="email" value="{$_modx->user.email}" readonly>
    </div>
    <div class="form-group col-12 mb-3">
        <label class="form-label" for="af_field_list_company">Компания&nbsp;<span class="red">*</span></label>
        {set $field_list_company = $_modx->user.field_list_company | split : ';'}
        {if $field_list_company | count > 1}
            <select name="field_list_company" id="af_field_list_company" class="form-control">
                <option value="">Выберите компанию</option>
                {foreach $field_list_company as $item}
                    <option value="{$item}">{$item}</option>
                {/foreach}
            </select>
            <img src="theme/images/auth/pensil-ico.svg" class="img-svg">
        {else}
            <input class="form-control" type="text" placeholder="Компания" id="af_field_list_company" name="field_list_company"  value="{$_modx->user.field_list_company}" readonly>
        {/if}
    </div>
    <div class="form-group col-12 mb-3 d-flex flex-column">
        <label class="form-label" for="af_message">Сообщение&nbsp;<span class="red">*</span></label>
        <textarea class="form-control" id="af_message" name="message"  value=""></textarea>
        <img src="theme/images/auth/pensil-ico.svg" class="img-svg">
    </div>
    <div class="d-flex justify-content-center w-100">
        <button type="submit" class="btn btn-red">Отправить</button>
    </div>
</form>
