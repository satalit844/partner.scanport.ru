<div id="office-auth-form">
    <form class="d-flex flex-column" method="post" id="office-auth-login">
        <div class="form-group mb-3">
            <label class="form-label" for="office-auth-login-email">Ваша почта</label>
            <input class="form-control" type="text" name="username" id="office-auth-login-username" value="" placeholder="Ваш e-mail">
            <img src="theme/images/auth/pensil-ico.svg" class="img-svg">
        </div>
        <p class="mb-3 p-3">
            На указанную или привязанную к профилю почту будет отправлено письмо cо ссылкой для восстановления пароля
        </p>
        <div class="d-flex gap-2 align-items-center button-groups">
            <div class="col">
                <input type="hidden" name="action" value="auth/formLogin"/>
                <input type="hidden" name="return" value=""/>
                <button type="submit" class="btn btn-red w-100">Восстановить</button>
            </div>
        </div>
    </form>
    {if $error?}
        <div class="alert alert-danger">{$error}</div>
    {/if}
</div>
