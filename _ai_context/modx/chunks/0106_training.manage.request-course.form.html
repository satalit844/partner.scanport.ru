<form
    id="training-course-request-form"
    class="training-request-modal__form ajax_form"
    action="[[~[[*id]]]]"
    method="post"
    novalidate
    data-request-course-form
>
    <input type="hidden" name="af_action" value="[[+af_action]]">
    <input type="hidden" name="form_id" value="training_course_request">
    <input type="hidden" name="request_user_id" value="[[+training_course_request_user_id]]">
    <input type="hidden" name="request_context" value="[[+training_course_request_context_key]]">
    <input type="hidden" name="requested_course_id" value="[[+fi.requested_course_id]]" data-request-course-id>
    <input type="hidden" name="requested_course_resource_id" value="[[+fi.requested_course_resource_id]]" data-request-course-resource-id>
    <input type="hidden" name="requested_course_title" value="[[+fi.requested_course_title]]" data-request-course-title>
    <input type="hidden" name="company" value="[[+fi.company:default=`[[+training_course_request_company]]`]]" data-request-company>

    <div class="training-request-modal__head">
        <div class="training-request-modal__title" id="trainingCourseRequestModalLabel">Запросить курс</div>
        <div class="training-request-modal__text">
            Заполните информацию и ваша заявка отправится на рассмотрение. С вами обязательно свяжется наш оператор.
        </div>
    </div>

    <div class="training-request-modal__fields">
        <label class="training-request-modal__field d-none" data-request-course-selected-wrap>
            <span class="training-request-modal__label">Запрашиваемый курс</span>
            <input
                type="text"
                class="training-request-modal__input"
                value="[[+fi.requested_course_title]]"
                data-request-course-selected-title
                readonly
            >
        </label>

        <label class="training-request-modal__field">
            <span class="training-request-modal__label">ФИО</span>
            <input
                type="text"
                name="fullname"
                class="training-request-modal__input"
                value="[[+fi.fullname:default=`[[+training_course_request_fullname]]`]]"
                placeholder="Иван Иванов"
                autocomplete="name"
                required
            >
            <span class="training-request-modal__error">[[+fi.error.fullname]]</span>
        </label>

        <div class="training-request-modal__row">
            <label class="training-request-modal__field">
                <span class="training-request-modal__label">Email</span>
                <input
                    type="email"
                    name="email"
                    class="training-request-modal__input"
                    value="[[+fi.email:default=`[[+training_course_request_email]]`]]"
                    placeholder="customer123@gmail.com"
                    autocomplete="email"
                    required
                >
                <span class="training-request-modal__error">[[+fi.error.email]]</span>
            </label>

            <label class="training-request-modal__field">
                <span class="training-request-modal__label">Номер телефона</span>
                <input
                    type="text"
                    name="phone"
                    class="training-request-modal__input form-phone"
                    value=""
                    data-value="[[+fi.phone:default=`[[+training_course_request_phone]]`]]"
                    placeholder="+7 (000) 000-00-00"
                    autocomplete="tel"
                >
                <span class="training-request-modal__error">[[+fi.error.phone]]</span>
            </label>
        </div>

        <label class="training-request-modal__field training-request-modal__field--message">
            <span class="training-request-modal__label">Дополнительная информация</span>
            <textarea
                name="message"
                class="training-request-modal__textarea"
                placeholder="Описание"
            >[[+fi.message]]</textarea>
            <span class="training-request-modal__error">[[+fi.error.message]]</span>
        </label>

        <label class="training-request-modal__agree">
            <input
                type="checkbox"
                name="personal_data_agree"
                value="1"
                class="training-request-modal__agree-check"
                [[+fi.personal_data_agree:FormItIsChecked=`1`]]
                required
            >
            <span>Я даю согласие на обработку своих персональных данных</span>
        </label>
        <span class="training-request-modal__error">[[+fi.error.personal_data_agree]]</span>

        [[+fi.validation_error_message:notempty=`<div class="training-request-modal__response training-request-modal__response--error">[[+fi.validation_error_message]]</div>`]]
        [[+fi.successMessage:notempty=`<div class="training-request-modal__response training-request-modal__response--success">[[+fi.successMessage]]</div>`]]
    </div>

    <div class="training-request-modal__actions">
        <button type="submit" name="training_course_request_submit" value="1" class="training-request-modal__submit">Отправить</button>
    </div>
</form>
